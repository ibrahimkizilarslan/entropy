# Entropy deterministic scenario example.
# This example is aligned with the demo environment in examples/demo-distributed.

name: "Gateway Degrades Gracefully During Catalog CPU Stress"
description: "Applies CPU throttling to catalog-service and verifies api-gateway remains healthy."
hypothesis: "The gateway endpoint should keep returning HTTP 200 during and after stress."

steps:
  # 1) Baseline HTTP health check
  - probe:
      type: http
      url: "http://localhost:8085/api/catalog"
      expect_status: 200
      timeout: 5

  # 2) Optional TCP reachability probe
  - probe:
      type: tcp
      host_port: "localhost:8085"
      timeout: 3

  # 3) Inject temporary CPU limit
  - inject:
      action:
        name: limit_cpu
        cpus: 0.10
        duration: 10
      target: catalog-service

  # 4) Give the system time to absorb the fault
  - wait: 3s

  # 5) Service should still respond
  - probe:
      type: http
      url: "http://localhost:8085/api/catalog"
      expect_status: 200
      timeout: 5

  # 6) Optional exec probe inside a container
  #    Keep command simple because it is split by spaces.
  - probe:
      type: exec
      target: api-gateway
      command: cat /etc/hosts
      timeout: 5

  # 7) Wait for auto-restore duration to pass
  - wait: 12s

  # 8) Final verification after rollback
  - probe:
      type: http
      url: "http://localhost:8085/api/catalog"
      expect_status: 200
      timeout: 5
