# Entropy example random-chaos configuration.
# Copy this file to chaos.yaml and update targets to match your services.

# Injection interval in seconds (must be >= 1)
interval: 10

# Docker Compose service names or container names
targets:
  - api-gateway
  - catalog-service
  - auth-service

# Supported actions:
# stop, restart, pause, delay, loss, limit_cpu, limit_memory
#
# You can use simple scalar actions:
#   - stop
# Or full action specs with parameters:
#   - name: delay
#     latency_ms: 250
#     jitter_ms: 40
#     duration: 20
actions:
  - stop
  - restart
  - pause
  - name: delay
    latency_ms: 300
    jitter_ms: 50
    duration: 15
  - name: loss
    percent: 20
    duration: 15
  - name: limit_cpu
    cpus: 0.25
    duration: 20
  - name: limit_memory
    memory_mb: 128
    duration: 20

# Safety controls
safety:
  max_down: 1      # Maximum number of simultaneously down services
  cooldown: 20     # Minimum seconds between injections
  dry_run: false   # If true, log planned injections without executing

