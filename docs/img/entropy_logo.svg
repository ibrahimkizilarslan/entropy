<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Entropy CLI Logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Kırılan kalkan — güç ve kaos sembolü, geliştirilmiş versiyon</desc>
<defs>
  <linearGradient id="leftShield" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#cccccc" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#888888" stop-opacity="0.75"/>
  </linearGradient>
  <linearGradient id="rightShield" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#aaaaaa" stop-opacity="0.80"/>
    <stop offset="50%" stop-color="#888888" stop-opacity="0.70"/>
    <stop offset="100%" stop-color="#555555" stop-opacity="0.65"/>
  </linearGradient>
  <linearGradient id="crackGlow" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="40%" stop-color="#ffffff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
  </linearGradient>
  <filter id="crackBloom" x="-40%" y="-10%" width="180%" height="120%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="shieldShadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
  </filter>
  <clipPath id="leftClip">
    <polygon points="340,95 168,172 168,352 254,452 340,492"/>
  </clipPath>
  <clipPath id="rightClip">
    <polygon points="340,95 512,172 512,352 426,452 340,492"/>
  </clipPath>
</defs>



<!-- SOL KALKAN — ana form -->
<g filter="url(#shieldShadow)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <path d="M340,95&#10;       L168,172&#10;       L168,352&#10;       L254,452&#10;       L340,492&#10;       L340,95Z" style="fill:rgb(238, 238, 238);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- SOL KALKAN — iç yüzey tonu, derinlik -->
