<svg width="100%" viewBox="0 0 820 280" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Entropy CLI Logo</title>
<defs>
  <linearGradient id="crackGlow" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="1.0"/>
    <stop offset="55%" stop-color="#ffffff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
  </linearGradient>
  <filter id="bloom" x="-100%" y="-30%" width="300%" height="160%">
    <feGaussianBlur stdDeviation="7" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="shieldShadow">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f0f0f0"/>
    <stop offset="100%" stop-color="#888888"/>
  </linearGradient>
</defs>

